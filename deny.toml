# cargo-deny configuration. Run locally with: cargo deny check
# (install: cargo install cargo-deny). The CI `supply-chain` job runs this.

[advisories]
# Fail on any crate with a known vulnerability. The DB is refreshed by the
# weekly CI run, so new CVEs surface without a PR.
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

[licenses]
# Permissive licenses only; add an entry here if a new dependency needs one.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
# Warn (don't fail) on duplicate versions — common in a tokio/hyper graph and
# often unactionable from a leaf crate.
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Only crates.io; no git/path deps sneaking in.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
