name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly supply-chain re-scan (advisory DBs move; catch new CVEs).
    - cron: "17 6 * * 1"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  build-test:
    name: build & test (${{ matrix.os }} / ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        # macOS builds the not(target_os = "linux") paths in proc.rs (the
        # signal-0 fallback) that a Linux-only CI never compiled; the MSRV
        # pin (1.85, edition 2024 floor) catches accidental toolchain raises.
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, "1.85"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (--locked, --all-features, -D warnings)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Tests (--locked)
        run: cargo test --all --locked
      - name: Release build (--locked)
        run: cargo build --release --locked

  supply-chain:
    name: cargo-deny + cargo-audit
    runs-on: ubuntu-latest
    # Non-blocking until the policy (deny.toml) has been reviewed against the
    # full dependency graph; flip to a hard requirement once confirmed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: cargo-deny (advisories, bans, licenses, sources)
        run: cargo deny check advisories bans licenses sources
      - name: cargo-audit
        run: cargo audit
