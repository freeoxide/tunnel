name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly supply-chain re-scan (advisory DBs move; catch new CVEs).
    - cron: "17 6 * * 1"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  build-test:
    name: build & test (${{ matrix.os }} / ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        # macOS builds the macOS sysctl PID-identity path in proc.rs and the
        # not(target_os = "linux") fallbacks; Windows builds the windows-sys
        # detached-worker (Job Object) + OpenProcess paths. Both now compile
        # and run the target-gated tests. The MSRV pin (1.88 — the real floor
        # of the locked dep tree, since comfy-table 7.2.2 uses let-chains
        # stabilized in 1.88) catches accidental toolchain raises.
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, "1.88"]
    runs-on: ${{ matrix.os }}
    env:
      # sccache (GitHub Actions cache backend) caches compiled crate artifacts
      # across runs — complementary to rust-cache, which handles the coarse
      # target/ restore. CARGO_INCREMENTAL=0 because incremental artifacts are
      # not cacheable and pointless in CI.
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Installs sccache and wires up the GHA cache backend (exports
      # ACTIONS_CACHE_URL / ACTIONS_RUNTIME_TOKEN for later steps); saves the
      # compiled-artifact cache in its post step.
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Clippy (--locked, --all-features, -D warnings)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Tests (--locked, --all-features)
        run: cargo test --all --all-features --locked
      - name: Release build (--locked)
        run: cargo build --release --locked
      - name: sccache stats
        if: always()
        continue-on-error: true
        shell: bash
        run: sccache --show-stats

  supply-chain:
    name: cargo-deny + cargo-audit
    runs-on: ubuntu-latest
    # Non-blocking until the policy (deny.toml) has been reviewed against the
    # full dependency graph; flip to a hard requirement once confirmed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2
        with:
          tool: cargo-deny,cargo-audit
      - name: cargo-deny (advisories, bans, licenses, sources)
        run: cargo deny check advisories bans licenses sources
      - name: cargo-audit
        run: cargo audit
